<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Cinematic Hand-Controlled Particles</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #02030a;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #ffffff;
    }
    #three-canvas {
      position: fixed;
      inset: 0;
      display: block;
    }
    #webcam {
      position: fixed;
      right: 10px;
      bottom: 10px;
      width: 160px;
      height: 120px;
      object-fit: cover;
      border-radius: 8px;
      border: 2px solid rgba(255,255,255,0.2);
      opacity: 0.35;
    }
    #ui {
      position: fixed;
      left: 10px;
      top: 10px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      z-index: 10;
      background: rgba(0,0,0,0.45);
      padding: 8px;
      border-radius: 8px;
      backdrop-filter: blur(10px);
    }
    #ui h1 {
      font-size: 14px;
      margin: 0 0 4px 0;
    }
    #ui button {
      padding: 4px 8px;
      border-radius: 4px;
      border: 1px solid rgba(255,255,255,0.25);
      background: rgba(10,10,30,0.9);
      color: #fff;
      font-size: 12px;
      cursor: pointer;
    }
    #ui button:hover {
      background: rgba(40,40,80,1);
    }
    #status {
      font-size: 11px;
      opacity: 0.8;
      margin-top: 4px;
      max-width: 260px;
    }
  </style>

  <!-- Three.js CDN -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.min.js" crossorigin="anonymous"></script>
</head>
<body>
  <canvas id="three-canvas"></canvas>
  <video id="webcam" autoplay playsinline muted></video>

  <div id="ui">
    <h1>Hand Particles</h1>
    <button data-shape="heart">Heart</button>
    <button data-shape="flower">Flower</button>
    <button data-shape="saturn">Saturn</button>
    <button data-shape="fireworks">Fireworks</button>
    <div id="status">Loading...</div>
  </div>

  <script type="module">
    import {
      FilesetResolver,
      HandLandmarker
    } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14";

    const canvas = document.getElementById("three-canvas");
    const video = document.getElementById("webcam");
    const statusEl = document.getElementById("status");
    const uiEl = document.getElementById("ui");

    // ---------- THREE.js setup ----------
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x02030a);

    const camera = new THREE.PerspectiveCamera(
      60,
      window.innerWidth / window.innerHeight,
      0.1,
      100
    );
    camera.position.set(0, 1.5, 6);

    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.setSize(window.innerWidth, window.innerHeight);

    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    const PARTICLE_COUNT = 25000;
    const geometry = new THREE.BufferGeometry();
    const basePositions = new Float32Array(PARTICLE_COUNT * 3);
    const targetPositions = new Float32Array(PARTICLE_COUNT * 3);

    for (let i = 0; i < PARTICLE_COUNT; i++) {
      const r = Math.random() * 1.2;
      const theta = Math.random() * Math.PI * 2;
      const phi = Math.acos(2 * Math.random() - 1);
      const x = r * Math.sin(phi) * Math.cos(theta);
      const y = r * Math.sin(phi) * Math.sin(theta);
      const z = r * Math.cos(phi);
      basePositions.set([x, y, z], i * 3);
      targetPositions.set([x, y, z], i * 3);
    }

    geometry.setAttribute("position", new THREE.BufferAttribute(basePositions, 3));
    geometry.setAttribute("targetPosition", new THREE.BufferAttribute(targetPositions, 3));

    const vertexShader = `
      uniform float uTime;
      uniform float uMorph;
      uniform float uSpread;
      uniform vec3 uHandPos;
      uniform float uHandTension;
      attribute vec3 targetPosition;
      varying float vLife;
      void main() {
        vec3 base = position;
        vec3 target = targetPosition;
        vec3 pos = mix(base, target, uMorph);
        pos *= (1.0 + uSpread * uHandTension);

        vec3 toHand = uHandPos - pos;
        float dist = length(toHand) + 0.001;
        pos += normalize(toHand) * (uHandTension * 0.4 / dist);

        vLife = fract(uTime * 0.2 + float(gl_VertexID) * 0.0001);

        gl_Position = projectionMatrix * modelViewMatrix * vec4(pos, 1.0);
        float size = 3.0 + 7.0 * uHandTension;
        gl_PointSize = size;
      }
    `;

    const fragmentShader = `
      precision highp float;
      uniform vec3 uColorA;
      uniform vec3 uColorB;
      uniform float uHandTension;
      varying float vLife;
      void main() {
        vec2 uv = gl_PointCoord * 2.0 - 1.0;
        float d = dot(uv, uv);
        if (d > 1.0) discard;

        float alpha = smoothstep(1.0, 0.0, d);

        vec3 baseColor = mix(uColorA, uColorB, vLife);
        vec3 hot = vec3(1.0, 0.35, 0.6);
        vec3 color = mix(baseColor, hot, uHandTension);

        gl_FragColor = vec4(color, alpha);
      }
    `;

    const uniforms = {
      uTime: { value: 0 },
      uMorph: { value: 0 },
      uSpread: { value: 0.6 },
      uHandPos: { value: new THREE.Vector3() },
      uHandTension: { value: 0 },
      uColorA: { value: new THREE.Color(0x18c0ff) }, // teal
      uColorB: { value: new THREE.Color(0xffa040) }  // orange
    };

    const material = new THREE.ShaderMaterial({
      uniforms,
      vertexShader,
      fragmentShader,
      blending: THREE.AdditiveBlending,
      depthWrite: false,
      transparent: true
    });

    const points = new THREE.Points(geometry, material);
    scene.add(points);

    const targetAttr = geometry.getAttribute("targetPosition");

    // ---------- Shape templates ----------
    function fillHeart(arr) {
      for (let i = 0; i < PARTICLE_COUNT; i++) {
        const t = (i / PARTICLE_COUNT) * Math.PI * 2.0;
        const r = 0.9 + (Math.random() - 0.5) * 0.08;
        const x = r * 16.0 * Math.pow(Math.sin(t), 3.0) / 18.0;
        const y =
          r *
          (13.0 * Math.cos(t) -
           5.0 * Math.cos(2.0 * t) -
           2.0 * Math.cos(3.0 * t) -
           Math.cos(4.0 * t)) / 20.0;
        const z = (Math.random() - 0.5) * 0.25;
        arr[i * 3 + 0] = x;
        arr[i * 3 + 1] = y;
        arr[i * 3 + 2] = z;
      }
    }

    function fillFlower(arr) {
      for (let i = 0; i < PARTICLE_COUNT; i++) {
        const t = Math.random() * Math.PI * 2.0;
        const k = 6.0;
        const r = 0.8 + 0.25 * Math.cos(k * t);
        const radius = r * (0.6 + Math.random() * 0.2);
        const x = radius * Math.cos(t);
        const y = radius * Math.sin(t);
        const z = (Math.random() - 0.5) * 0.3;
        arr[i * 3 + 0] = x;
        arr[i * 3 + 1] = y;
        arr[i * 3 + 2] = z;
      }
    }

    function fillSaturn(arr) {
      for (let i = 0; i < PARTICLE_COUNT; i++) {
        if (i < PARTICLE_COUNT * 0.4) {
          const u = Math.random() * Math.PI;
          const v = Math.random() * Math.PI * 2.0;
          const a = 0.6;
          const b = 0.9;
          const x = a * Math.sin(u) * Math.cos(v);
          const y = b * Math.sin(u) * Math.sin(v);
          const z = a * Math.cos(u);
          arr[i * 3 + 0] = x * 0.7;
          arr[i * 3 + 1] = y * 0.7;
          arr[i * 3 + 2] = z * 0.7;
        } else {
          const ringR = 1.2 + Math.random() * 0.3;
          const t = Math.random() * Math.PI * 2.0;
          const x = ringR * Math.cos(t);
          const z = ringR * Math.sin(t);
          const y = (Math.random() - 0.5) * 0.05;
          arr[i * 3 + 0] = x;
          arr[i * 3 + 1] = y;
          arr[i * 3 + 2] = z;
        }
      }
    }

    function fillFireworks(arr) {
      for (let i = 0; i < PARTICLE_COUNT; i++) {
        const r = Math.pow(Math.random(), 0.35) * 1.5;
        const theta = Math.random() * Math.PI * 2.0;
        const phi = Math.acos(2.0 * Math.random() - 1.0);
        const x = r * Math.sin(phi) * Math.cos(theta);
        const y = r * Math.sin(phi) * Math.sin(theta);
        const z = r * Math.cos(phi);
        arr[i * 3 + 0] = x;
        arr[i * 3 + 1] = y;
        arr[i * 3 + 2] = z;
      }
    }

    function setShape(shape) {
      const arr = targetAttr.array;
      if (shape === "heart") {
        fillHeart(arr);
        uniforms.uColorA.value.set(0xff4d88);
        uniforms.uColorB.value.set(0xffe699);
      } else if (shape === "flower") {
        fillFlower(arr);
        uniforms.uColorA.value.set(0x18c0ff);
        uniforms.uColorB.value.set(0xff88ff);
      } else if (shape === "saturn") {
        fillSaturn(arr);
        uniforms.uColorA.value.set(0x8ad2ff);
        uniforms.uColorB.value.set(0xffcc88);
      } else if (shape === "fireworks") {
        fillFireworks(arr);
        uniforms.uColorA.value.set(0xfff0aa);
        uniforms.uColorB.value.set(0xff3399);
      }
      targetAttr.needsUpdate = true;
      uniforms.uMorph.value = 1.0;
    }

    uiEl.addEventListener("click", (e) => {
      const btn = e.target;
      const shape = btn.dataset.shape;
      if (!shape) return;
      setShape(shape);
    });

    // ---------- MediaPipe HandLandmarker ----------
    let handLandmarker = null;
    let lastVideoTime = -1;
    let lastTension = 0;

    async function initMediaPipe() {
      const vision = await FilesetResolver.forVisionTasks(
        "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/wasm"
      );
      handLandmarker = await HandLandmarker.createFromOptions(vision, {
        baseOptions: {
          modelAssetPath:
            "https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/latest/hand_landmarker.task"
        },
        runningMode: "VIDEO",
        numHands: 1
      });
      statusEl.textContent = "Show your hand to control particles";
    }

    async function initWebcam() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: "user" },
          audio: false
        });
        video.srcObject = stream;
        await video.play();
      } catch (err) {
        statusEl.textContent = "Camera error: " + err.message;
      }
    }

    function updateHand() {
      if (!handLandmarker) return;
      if (!video || video.readyState < 2) return;

      const now = video.currentTime;
      if (now === lastVideoTime) return;
      lastVideoTime = now;

      const results = handLandmarker.detectForVideo(video, performance.now());
      if (!results || !results.landmarks || results.landmarks.length === 0) {
        uniforms.uHandTension.value = THREE.MathUtils.lerp(
          uniforms.uHandTension.value,
          0,
          0.1
        );
        return;
      }

      const hand = results.landmarks[0];
      const wrist = hand[0];
      const indexTip = hand[8];
      const thumbTip = hand[4];

      const dx = thumbTip.x - indexTip.x;
      const dy = thumbTip.y - indexTip.y;
      const dz = thumbTip.z - indexTip.z;
      let tension = Math.sqrt(dx * dx + dy * dy + dz * dz);
      tension = 1.0 - THREE.MathUtils.clamp(tension * 3.0, 0.0, 1.0);
      const smoothedTension = THREE.MathUtils.lerp(
        uniforms.uHandTension.value,
        tension,
        0.25
      );
      uniforms.uHandTension.value = smoothedTension;

      const fx = (wrist.x - 0.5) * 4.0;
      const fy = (0.5 - wrist.y) * 3.0;
      const fz = 0.0;
      uniforms.uHandPos.value.set(fx, fy, fz);

      if (smoothedTension > 0.85 && lastTension < 0.4) {
        setShape("fireworks");
      }
      lastTension = smoothedTension;
    }

    const clock = new THREE.Clock();
    let baseCamRadius = 6;
    let baseCamHeight = 1.5;

    function animate() {
      requestAnimationFrame(animate);
      const t = clock.getElapsedTime();

      const orbitSpeed = 0.15;
      const angle = t * orbitSpeed;

      const target = new THREE.Vector3(0, 0, 0);
      const handOffset = uniforms.uHandPos.value.clone().multiplyScalar(0.15);

      camera.position.x = Math.cos(angle) * baseCamRadius + handOffset.x;
      camera.position.z = Math.sin(angle) * baseCamRadius;
      camera.position.y = baseCamHeight + handOffset.y * 0.5;

      camera.lookAt(target);

      uniforms.uTime.value = t;
      updateHand();
      renderer.render(scene, camera);
    }

    async function main() {
      statusEl.textContent = "Requesting camera...";
      await initWebcam();
      statusEl.textContent = "Loading hand model (first time is slow)...";
      await initMediaPipe();
      setShape("heart");
      animate();
    }

    main();
  </script>
</body>
</html>
